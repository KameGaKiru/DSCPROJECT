<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Checklist — Motorista</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-4">

  <div class="d-flex align-items-center mb-4 gap-2">
    <h4 class="mb-0 fw-bold">🚌 Checklist do Veículo</h4>
    <div class="ms-auto d-flex gap-2">
      <button onclick="window.location.href='dashboard_motorista.html'"
        class="btn btn-outline-secondary btn-sm">← Voltar</button>
      <button id="logoutBtn" class="btn btn-danger btn-sm">Sair</button>
    </div>
  </div>

  <!-- FORMULÁRIO -->
  <div class="card shadow-sm mb-4">
    <div class="card-header bg-dark text-white fw-semibold">📋 Novo Checklist</div>
    <div class="card-body">
      <div class="row g-3 mb-3">
        <div class="col-md-4">
          <label class="form-label fw-semibold">Tipo</label>
          <select id="tipo" class="form-select">
            <option value="ENTRADA">🟢 Entrada</option>
            <option value="SAIDA">🟠 Saída</option>
          </select>
        </div>
        <div class="col-md-4">
          <label class="form-label fw-semibold">Veículo</label>
          <select id="veiculoSelect" class="form-select">
            <option value="">Carregando veículos...</option>
          </select>
        </div>
        <div class="col-md-4">
          <label class="form-label fw-semibold">KM Atual</label>
          <input type="number" id="km" class="form-control" placeholder="Ex: 12500" min="0">
        </div>
      </div>

      <label class="form-label fw-semibold">Itens de Verificação</label>
      <div class="row row-cols-2 row-cols-md-4 g-2 mb-3">
        <div class="col"><div class="form-check border rounded p-2">
          <input class="form-check-input" type="checkbox" id="faroisDianteiros">
          <label class="form-check-label" for="faroisDianteiros">Faróis Dianteiros</label>
        </div></div>
        <div class="col"><div class="form-check border rounded p-2">
          <input class="form-check-input" type="checkbox" id="setasDianteiras">
          <label class="form-check-label" for="setasDianteiras">Setas Dianteiras</label>
        </div></div>
        <div class="col"><div class="form-check border rounded p-2">
          <input class="form-check-input" type="checkbox" id="faroisTraseiros">
          <label class="form-check-label" for="faroisTraseiros">Faróis Traseiros</label>
        </div></div>
        <div class="col"><div class="form-check border rounded p-2">
          <input class="form-check-input" type="checkbox" id="setasTraseiras">
          <label class="form-check-label" for="setasTraseiras">Setas Traseiras</label>
        </div></div>
        <div class="col"><div class="form-check border rounded p-2">
          <input class="form-check-input" type="checkbox" id="luzesFreio">
          <label class="form-check-label" for="luzesFreio">Luzes de Freio</label>
        </div></div>
        <div class="col"><div class="form-check border rounded p-2">
          <input class="form-check-input" type="checkbox" id="nivelOleo">
          <label class="form-check-label" for="nivelOleo">Nível de Óleo</label>
        </div></div>
        <div class="col"><div class="form-check border rounded p-2">
          <input class="form-check-input" type="checkbox" id="nivelAgua">
          <label class="form-check-label" for="nivelAgua">Nível de Água</label>
        </div></div>
      </div>

      <!-- Observações com limite de 400 caracteres -->
      <div class="mb-3">
        <label class="form-label fw-semibold">Observações</label>
        <textarea id="observacoes" class="form-control" rows="3"
          maxlength="400"
          placeholder="Descreva problemas ou ocorrências (máx. 400 caracteres)..."></textarea>
        <div class="d-flex justify-content-between mt-1">
          <!-- Mensagem de erro inline — oculta por padrão -->
          <small id="observacoesErro" class="text-danger" style="display:none;">
            As observações não podem conter apenas espaços em branco.
          </small>
          <small class="text-muted ms-auto">
            <span id="contadorObservacoes">0</span>/400
          </small>
        </div>
      </div>

      <button onclick="registrarChecklist()" class="btn btn-primary px-4">
        ✅ Salvar Checklist
      </button>
    </div>
  </div>

  <!-- HISTÓRICO -->
  <div class="card shadow-sm">
    <div class="card-header bg-dark text-white fw-semibold">🕓 Histórico de Checklists</div>
    <div class="card-body p-0">
      <div class="table-responsive">
        <table class="table table-striped table-bordered mb-0">
          <thead class="table-dark">
            <tr>
              <th>Tipo</th>
              <th>Veículo</th>
              <th>Motorista</th>
              <th>KM</th>
              <th>Observações</th>
              <th>Solução</th>
              <th>Data / Hora</th>
            </tr>
          </thead>
          <tbody id="checklistTable">
            <tr><td colspan="7" class="text-center text-muted py-3">Carregando...</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
  // Contador de caracteres em tempo real para o campo de observações
  const obsTextarea = document.getElementById("observacoes");
  const obsContador = document.getElementById("contadorObservacoes");
  const obsErro     = document.getElementById("observacoesErro");

  obsTextarea.addEventListener("input", function () {
    obsContador.textContent = this.value.length;

    // Se o usuário começou a digitar conteúdo real, esconde o erro
    if (this.value.trim().length > 0) {
      obsErro.style.display = "none";
      this.classList.remove("is-invalid");
    }
  });
</script>
<script src="js/checklist.js"></script>
</body>
</html>
