<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Dashboard - Motorista</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background-color: #f0f2f5; }

    .topbar {
      background: #1a1a2e;
      color: #fff;
      padding: 14px 28px;
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 28px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.2);
    }
    .topbar h1 { font-size: 1.1rem; margin: 0; font-weight: 600; }
    .topbar .actions { display: flex; gap: 8px; margin-left: auto; }

    /* Cards de estatística */
    .stat-card {
      border: none;
      border-radius: 14px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
      padding: 22px 28px;
      display: flex;
      align-items: center;
      gap: 18px;
      background: #fff;
    }
    .stat-icon {
      font-size: 2.4rem;
      width: 60px;
      height: 60px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .stat-icon.blue  { background: #e8f0fe; }
    .stat-icon.gold  { background: #fff8e1; }
    .stat-label { font-size: .8rem; color: #6c757d; text-transform: uppercase; letter-spacing: .05em; }
    .stat-value { font-size: 2rem; font-weight: 700; line-height: 1.1; color: #1a1a2e; }
    .stat-sub   { font-size: .82rem; color: #6c757d; margin-top: 2px; }

    /* Ranking badge especial */
    .rank-1 .stat-value { color: #f59e0b; }
    .rank-2 .stat-value { color: #6b7280; }
    .rank-3 .stat-value { color: #b45309; }

    .card {
      border: none;
      border-radius: 12px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.07);
    }
    .card-header-bar {
      background: #1a1a2e;
      color: #fff;
      border-radius: 12px 12px 0 0;
      padding: 13px 20px;
      font-weight: 600;
      font-size: .95rem;
    }
  </style>
</head>
<body>

<!-- TOPBAR -->
<div class="topbar">
  <span style="font-size:1.5rem">🚌</span>
  <h1>Dashboard — Motorista</h1>
  <div class="actions">
    <button id="checklistBtn" class="btn btn-primary btn-sm">+ Fazer Checklist</button>
    <button id="logoutBtn" class="btn btn-danger btn-sm">Sair</button>
  </div>
</div>

<div class="container pb-5">

  <!-- CARDS DE ESTATÍSTICA -->
  <div class="row g-3 mb-4">

    <div class="col-md-6">
      <div class="stat-card">
        <div class="stat-icon blue">📋</div>
        <div>
          <div class="stat-label">Meus Checklists</div>
          <div class="stat-value" id="totalChecklists">—</div>
          <div class="stat-sub">registros feitos por você</div>
        </div>
      </div>
    </div>

    <div class="col-md-6">
      <div class="stat-card" id="rankingCard">
        <div class="stat-icon gold">🏆</div>
        <div>
          <div class="stat-label">Seu Ranking</div>
          <div class="stat-value" id="rankingPosicao">—</div>
          <div class="stat-sub" id="rankingSub">comparado a outros motoristas</div>
        </div>
      </div>
    </div>

  </div>

  <!-- LISTA DE FUNCIONÁRIOS -->
  <div class="card">
    <div class="card-header-bar">👥 Lista de Funcionários</div>
    <div class="card-body p-0">
      <div class="table-responsive">
        <table class="table table-striped table-bordered mb-0" id="usuariosTable">
          <thead class="table-dark">
            <tr>
              <th>Matrícula</th>
              <th>Nome</th>
              <th>Função</th>
              <th>Email</th>
              <th>Checklists</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>
    </div>
  </div>

</div>

<script>
const usuario    = JSON.parse(localStorage.getItem("usuario"));
const authHeader = localStorage.getItem("authHeader");

if (!usuario || !authHeader || usuario.funcao?.toUpperCase() !== "MOTORISTA") {
    alert("Acesso negado!");
    localStorage.clear();
    window.location.href = "index.html";
}

document.getElementById("logoutBtn").addEventListener("click", () => {
    localStorage.clear();
    window.location.href = "index.html";
});

document.getElementById("checklistBtn").addEventListener("click", () => {
    window.location.href = "dashboard_checklist.html";
});

// Carrega usuários
async function carregarDashboard() {
    try {
        // Busca usuários e checklists em paralelo
        const [resUsuarios, resChecklists] = await Promise.all([
            fetch("http://localhost:8080/api/usuario/listar",  { headers: { "Authorization": authHeader } }),
            fetch("http://localhost:8080/api/checklist/listar", { headers: { "Authorization": authHeader } })
        ]);

        if (resUsuarios.status === 401 || resChecklists.status === 401) {
            alert("Sessão expirada!");
            localStorage.clear();
            window.location.href = "index.html";
            return;
        }

        const usuarios   = resUsuarios.ok   ? await resUsuarios.json()   : [];
        const checklists = resChecklists.ok ? await resChecklists.json() : [];

        // Conta checklists por matrícula do motorista
        const contagemPorMotorista = {};
        checklists.forEach(c => {
            const mat = c.motorista?.matricula;
            if (mat) contagemPorMotorista[mat] = (contagemPorMotorista[mat] || 0) + 1;
        });

        // Filtra só motoristas e ordena por quantidade de checklists (ranking)
        const motoristas = usuarios
            .filter(u => u.funcao?.toUpperCase() === "MOTORISTA")
            .map(u => ({ ...u, total: contagemPorMotorista[u.matricula] || 0 }))
            .sort((a, b) => b.total - a.total);

        // Posição do motorista logado
        const minhaPosicao = motoristas.findIndex(m => m.matricula === usuario.matricula) + 1;
        const meuTotal     = contagemPorMotorista[usuario.matricula] || 0;

        // Cards de estatística
        document.getElementById("totalChecklists").textContent = meuTotal;

        const posEl  = document.getElementById("rankingPosicao");
        const subEl  = document.getElementById("rankingSub");
        const cardEl = document.getElementById("rankingCard");

        posEl.textContent = minhaPosicao + "º";
        subEl.textContent = `entre ${motoristas.length} motorista${motoristas.length !== 1 ? "s" : ""}`;

        // Cor especial para top 3
        if (minhaPosicao === 1) { cardEl.classList.add("rank-1"); }
        else if (minhaPosicao === 2) { cardEl.classList.add("rank-2"); }
        else if (minhaPosicao === 3) { cardEl.classList.add("rank-3"); }

        // Tabela de funcionários
        const tbody = document.querySelector("#usuariosTable tbody");
        tbody.innerHTML = "";

        usuarios.forEach(u => {
            const totalU   = contagemPorMotorista[u.matricula] || 0;
            const ehMotorista = u.funcao?.toUpperCase() === "MOTORISTA";

            // Só mostra coluna de checklists para motoristas
            const checklistCell = ehMotorista
                ? `<span class="badge bg-primary">${totalU}</span>`
                : `<span class="text-muted">—</span>`;

            const tr = document.createElement("tr");

            // Destaca a linha do usuário logado
            if (u.matricula === usuario.matricula) {
                tr.classList.add("table-active", "fw-semibold");
            }

            tr.innerHTML = `
              <td>${u.matricula}</td>
              <td>${u.nome} ${u.sobrenome ?? ""}</td>
              <td>${u.funcao}</td>
              <td>${u.email ?? ""}</td>
              <td>${checklistCell}</td>`;
            tbody.appendChild(tr);
        });

    } catch (err) {
        console.error("Erro ao carregar dashboard:", err);
        alert("Erro ao conectar ao servidor!");
    }
}

carregarDashboard();
</script>
</body>
</html>
