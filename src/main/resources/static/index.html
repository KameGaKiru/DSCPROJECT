<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Sistema de Registro - Login</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container d-flex align-items-center justify-content-center vh-100">
  <div class="card shadow-lg p-4 rounded-4" style="max-width: 400px; width: 100%;">
    <h3 class="text-center mb-3">Login</h3>
    <p class="text-muted text-center">Entre com sua matrícula e senha</p>

    <form id="loginForm">
      <div class="mb-3">
        <label for="matricula" class="form-label">Matrícula</label>
        <input type="text"
              class="form-control"
              id="matricula"
              inputmode="numeric"
              maxlength="12"
              placeholder="Somente números (máx. 12)"
              required>
      </div>

      <div class="mb-3">
        <label for="senha" class="form-label">Senha</label>
        <input type="password"
              class="form-control"
              id="senha"
              minlength="6"
              maxlength="20"
              placeholder="Entre 6 e 20 caracteres"
              required>
      </div>

      <button type="submit" class="btn btn-primary w-100">Entrar</button>
    </form>

    <div class="mt-3 text-center">
      <small class="text-muted">Não tem conta?</small>
      <br>
      <a href="registro.html" class="btn btn-link">Registrar-se</a>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"></script>

<script src="js/auth.js"></script>
<script>
document.getElementById("loginForm").addEventListener("submit", function(e){
    e.preventDefault();
    login(); 
});
</script>

<script>

    document.getElementById("matricula").addEventListener("input", function () {
      this.value = this.value.replace(/\D/g, "").slice(0, 12);
    });

    document.getElementById("senha").addEventListener("input", function () {
    this.value = this.value.replace(/\s/g, "").slice(0, 20);
    });

    document.getElementById("loginForm").addEventListener("submit", function(e){
      e.preventDefault();

      const matricula = document.getElementById("matricula").value.trim();
      const senha = document.getElementById("senha").value.replace(/\s/g, "");

      if (!/^\d+$/.test(matricula) || matricula.length > 12) {
          alert("A matrícula deve conter apenas números (máximo 12 dígitos).");
          document.getElementById("matricula").focus();
          return;
      }

      if (senha.length < 6 || senha.length > 20) {
          alert("A senha deve ter entre 6 e 20 caracteres.");
          document.getElementById("senha").focus();
          return;
      }

    login();
});
</script>

</body>
</html>
