<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Registro</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-5" style="max-width: 480px">
  <h2 class="mb-4">Registrar Usuário</h2>
  <form id="registroForm" novalidate>

    <div class="mb-3">
      <label for="matricula" class="form-label">Matrícula</label>
      <input type="text"
             class="form-control"
             id="matricula"
             inputmode="numeric"
             maxlength="12"
             placeholder="Somente números (máx. 12)"
             required>
      <div class="invalid-feedback">
        A matrícula deve conter apenas números (máximo 12 dígitos).
      </div>
    </div>

    <div class="mb-3">
      <label for="nome" class="form-label">Nome</label>
      <input type="text"
             class="form-control"
             id="nome"
             maxlength="60"
             placeholder="Máximo 60 caracteres"
             required>
      <div class="invalid-feedback">Nome é obrigatório (máximo 60 caracteres).</div>
    </div>

    <div class="mb-3">
      <label for="sobrenome" class="form-label">Sobrenome</label>
      <input type="text"
             class="form-control"
             id="sobrenome"
             maxlength="60"
             placeholder="Máximo 60 caracteres"
             required>
      <div class="invalid-feedback">Sobrenome é obrigatório (máximo 60 caracteres).</div>
    </div>

    <!-- Função -->
    <div class="mb-3">
      <label for="funcao" class="form-label">Função</label>
      <select id="funcao" class="form-select" required>
        <option value="MOTORISTA">Motorista</option>
        <option value="COORDENADOR">Coordenador</option>
        <option value="MECANICO">Mecânico</option>
      </select>
    </div>

    <div class="mb-4">
      <label for="senha" class="form-label">Senha</label>
      <input type="password"
             class="form-control"
             id="senha"
             minlength="6"
             maxlength="20"
             placeholder="Entre 6 e 20 caracteres"
             required>
      <div class="invalid-feedback">A senha deve ter entre 6 e 20 caracteres.</div>
    </div>

    <div class="d-flex gap-2">
      <button type="submit" class="btn btn-success px-4">Registrar</button>
      <a href="index.html" class="btn btn-outline-secondary">Voltar para login</a>
    </div>
  </form>
</div>

<script>

document.getElementById("matricula").addEventListener("input", function () {
    this.value = this.value.replace(/\D/g, "").slice(0, 12);
});

document.getElementById("nome").addEventListener("input", function () {
    this.value = this.value
        .replace(/\s/g, "") 
        .replace(/[^a-zA-ZÀ-ÿ]/g, "") 
        .slice(0, 60);
});

document.getElementById("sobrenome").addEventListener("input", function () {
    this.value = this.value
        .replace(/\s/g, "")
        .replace(/[^a-zA-ZÀ-ÿ]/g, "")
        .slice(0, 60);
});

document.getElementById("senha").addEventListener("input", function () {
    this.value = this.value.replace(/\s/g, "").slice(0, 20);
});

document.getElementById("registroForm").addEventListener("submit", async function (e) {
    e.preventDefault();

    const matricula = document.getElementById("matricula").value.trim();
    const nome      = document.getElementById("nome").value.replace(/\s/g, "").trim();
    const sobrenome = document.getElementById("sobrenome").value.replace(/\s/g, "").trim();
    const senha     = document.getElementById("senha").value.replace(/\s/g, "");
    const funcao    = document.getElementById("funcao").value;

    if (!/^\d+$/.test(matricula) || matricula.length > 12) {
        alert("A matrícula deve conter apenas números (máximo 12 dígitos).");
        document.getElementById("matricula").focus();
        return;
    }

    if (!nome || !/^[a-zA-ZÀ-ÿ]+$/.test(nome)) {
        alert("O nome deve conter apenas letras (máximo 60 caracteres).");
        document.getElementById("nome").focus();
        return;
    }

    if (!sobrenome || !/^[a-zA-ZÀ-ÿ]+$/.test(sobrenome)) {
        alert("O sobrenome deve conter apenas letras (máximo 60 caracteres).");
        document.getElementById("sobrenome").focus();
        return;
    }

    if (senha.length < 6 || senha.length > 20) {
        alert("A senha deve ter entre 6 e 20 caracteres.");
        document.getElementById("senha").focus();
        return;
    }

    const usuario = { matricula, nome, sobrenome, funcao, senha };

    try {
        const res = await fetch("http://localhost:8080/api/usuario/cadastrar", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(usuario)
        });

        if (res.ok) {
            alert("Usuário registrado com sucesso!");
            window.location.href = "index.html";
        } else {
            const erro = await res.text();
            alert("Erro: " + erro);
        }
    } catch (err) {
        alert("Erro ao conectar com o servidor.");
        console.error(err);
    }
});
</script>
</body>
</html>
